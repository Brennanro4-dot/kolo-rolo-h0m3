<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kolo & Rolo | Home Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7; --success: #22c55e;
            --danger: #f87171; --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --blue-accent: #005da4; --green-accent: #008c4e; --gold-accent: #ffcc00;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; min-height: 100vh; display: flex; justify-content: center; }
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; width: 100%; }
        #main-dashboard { display: none; width: 100%; max-width: 600px; background: var(--card); border-radius: 24px; padding: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); margin-top: 10px; box-sizing: border-box; }
        
        /* Stats & Progress */
        .header-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; text-align: center; }
        .countdown-timer { font-size: 1.2rem; font-weight: 900; color: var(--gold-accent); }

        .goal-container { margin-bottom: 25px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid rgba(99, 102, 241, 0.2); }
        .progress-bg { background: #0f172a; height: 18px; border-radius: 10px; overflow: hidden; border: 1px solid #334155; margin-top: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 1.5s ease-out; }

        .summary-bar { display: grid; grid-template-columns: 1fr; gap: 10px; background: linear-gradient(135deg, var(--blue-accent), var(--green-accent)); padding: 20px; border-radius: 20px; margin-bottom: 25px; text-align: center; border-bottom: 5px solid var(--gold-accent); }
        @media (min-width: 480px) { .summary-bar { grid-template-columns: 1fr 1fr 1fr; } }
        .summary-item label { display: block; font-size: 0.6rem; opacity: 0.9; text-transform: uppercase; font-weight: bold; color: white; margin-bottom: 2px; }
        .summary-item div { font-size: 1.2rem; font-weight: 800; color: white; }

        /* Section Styling */
        .section-title { color: var(--gold-accent); font-size: 0.8rem; border-bottom: 1px solid #334155; padding-bottom: 6px; margin-top: 30px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        
        .hub-form { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; }
        @media (min-width: 480px) { .hub-form { display: grid; grid-template-columns: 2fr 1fr 1fr auto; } }
        .hub-form input, .hub-form select { background: #0f172a; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; font-size: 1rem; }
        
        .list-item { background: rgba(255,255,255,0.04); padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary); }
        .list-item.savings { border-left-color: var(--success); }
        .list-item.expense { border-left-color: var(--danger); }
        
        .amt { font-weight: bold; font-size: 1rem; }
        .btn-add { background: var(--gold-accent); color: black; font-weight: bold; padding: 12px; border-radius: 8px; border: none; cursor: pointer; }
        
        #loader { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; display: none; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body onload="checkAuth()">

<div id="loader">Updating Kolo & Rolo...</div>

<div id="auth-screen">
    <h2 style="color: var(--gold-accent)">🗝️ Kolo & Rolo Hub</h2>
    <input type="password" id="passInput" placeholder="Hub Password" style="padding:15px; border-radius:12px; border:none; margin-bottom:15px; width:80%; text-align:center; background: #1e293b; color: white; font-size: 1.2rem;">
    <button class="btn-add" style="width: 80%" onclick="verify()">Unlock Hub</button>
</div>

<div id="main-dashboard">
    <div class="header-stats">
        <div class="stat-box">
            <label style="font-size: 0.6rem; text-transform: uppercase; color: #94a3b8;">Days to Move-in</label>
            <div id="timer" class="countdown-timer">--d --h</div>
        </div>
        <div class="stat-box" onclick="refreshData()" style="cursor:pointer; display:flex; flex-direction:column; justify-content:center;">
            <span style="font-size: 0.7rem; font-weight:bold; color:var(--primary)">🔄 REFRESH CLOUD</span>
        </div>
    </div>

    <div class="goal-container">
        <div style="display: flex; justify-content: space-between; font-size: 0.75rem; font-weight:bold;">
            <span>SAVINGS PROGRESS</span>
            <span id="goal-percent" style="color: var(--secondary)">0%</span>
        </div>
        <div class="progress-bg"><div id="progress-bar" class="progress-fill"></div></div>
    </div>

    <div class="summary-bar">
        <div class="summary-item"><label>Total Saved</label><div id="total-cap">€0</div></div>
        <div class="summary-item"><label>Expenses</label><div id="total-out">€0</div></div>
        <div class="summary-item"><label>The War Chest</label><div id="remaining" style="color:var(--gold-accent)">€0</div></div>
    </div>

    <div class="section-title">➕ Add Finance Entry</div>
    <div class="hub-form">
        <input type="text" id="fDesc" placeholder="e.g. Rolo Monthly">
        <input type="number" id="fAmt" placeholder="Amount €" inputmode="decimal">
        <select id="fType">
            <option value="savings">Savings (+)</option>
            <option value="expense">Expense (-)</option>
        </select>
        <button class="btn-add" onclick="addFinance()">Add</button>
    </div>

    <div class="section-title">📈 Savings / Income</div>
    <div id="savings-list"></div>

    <div class="section-title">📉 Expenses / Costs</div>
    <div id="expenses-list"></div>

    <div class="section-title">📦 Moving Tasks</div>
    <div class="hub-form">
        <input type="text" id="tDesc" placeholder="Task description...">
        <input type="text" id="tRoom" placeholder="Room/Category">
        <button class="btn-add" onclick="addTask()">Add Task</button>
    </div>
    <div id="task-list"></div>
    
    <div style="height: 50px;"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfTl5frfOriPVNI7kREyFbP9WVR-79Yod1AjQGcPona_72Me3GCYPvclMpAD89783evg/exec"; 
    const SHARED_PASSWORD = "Home2026"; 
    const MOVE_IN_DATE = new Date("April 1, 2026 12:00:00").getTime(); 
    const SAVINGS_TARGET = 30000; 

    // --- COUNTDOWN ---
    setInterval(function() {
        const distance = MOVE_IN_DATE - new Date().getTime();
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById("timer").innerHTML = days + "d " + hours + "h";
    }, 1000);

    // --- AUTH ---
    function checkAuth() { if (sessionStorage.getItem('authenticated') === 'true') showDashboard(); }
    function verify() {
        if (document.getElementById('passInput').value === SHARED_PASSWORD) {
            sessionStorage.setItem('authenticated', 'true');
            showDashboard();
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
        } else { alert("Try again!"); }
    }
    function showDashboard() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        refreshData();
    }

    // --- DATA ---
    async function refreshData() {
        showLoader(true);
        try {
            const resp = await fetch(SCRIPT_URL);
            const data = await resp.json();
            
            let totalSavings = 0, totalExpenses = 0;
            const savDisplay = document.getElementById('savings-list');
            const expDisplay = document.getElementById('expenses-list');
            
            savDisplay.innerHTML = '';
            expDisplay.innerHTML = '';

            data.finance.forEach(f => {
                const isSavings = f[2] === 'savings';
                const amt = parseFloat(f[1]) || 0;
                const html = `
                    <div class="list-item ${f[2]}">
                        <div style="font-weight:bold; font-size:0.9rem;">${f[0]}</div>
                        <div style="display:flex; align-items:center;">
                            <span class="amt" style="color:${isSavings ? 'var(--success)' : 'var(--danger)'}">€${amt.toLocaleString()}</span>
                            <button style="background:none; border:none; color:var(--danger); font-size:1.2rem; margin-left:10px;" onclick="deleteItem('finance', '${f[3]}')">✕</button>
                        </div>
                    </div>`;
                
                if(isSavings) {
                    totalSavings += amt;
                    savDisplay.innerHTML += html;
                } else {
                    totalExpenses += amt;
                    expDisplay.innerHTML += html;
                }
            });

            const tList = document.getElementById('task-list');
            tList.innerHTML = data.tasks.reverse().map(t => `
                <div class="list-item">
                    <div><div style="font-weight:bold; font-size:0.9rem;">${t[1]}</div><div style="font-size:0.7rem; color:#94a3b8;">${t[2]}</div></div>
                    <button style="background:none; border:none; color:var(--danger); font-size:1.2rem;" onclick="deleteItem('tasks', '${t[0]}')">✕</button>
                </div>`).join('');

            updateUI(totalSavings, totalExpenses);
        } catch (e) { console.error(e); }
        showLoader(false);
    }

    function updateUI(totalSavings, totalExpenses) {
        document.getElementById('total-cap').innerText = "€" + totalSavings.toLocaleString();
        document.getElementById('total-out').innerText = "€" + totalExpenses.toLocaleString();
        const rem = totalSavings - totalExpenses;
        document.getElementById('remaining').innerText = "€" + rem.toLocaleString();
        
        const percent = Math.min((totalSavings / SAVINGS_TARGET) * 100, 100).toFixed(0);
        document.getElementById('progress-bar').style.width = percent + "%";
        document.getElementById('goal-percent').innerText = percent + "%";
    }

    async function addFinance() {
        const desc = document.getElementById('fDesc').value;
        const amt = document.getElementById('fAmt').value;
        const type = document.getElementById('fType').value;
        if(!desc || !amt) return;
        showLoader(true);
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'ADD_FINANCE', desc, amt, fType: type, id: Date.now().toString() }) });
        document.getElementById('fDesc').value = ''; document.getElementById('fAmt').value = '';
        setTimeout(refreshData, 1000);
    }

    async function addTask() {
        const desc = document.getElementById('tDesc').value;
        const room = document.getElementById('tRoom').value || 'General';
        if(!desc) return;
        showLoader(true);
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'ADD_TASK', desc, room, id: Date.now().toString() }) });
        document.getElementById('tDesc').value = '';
        setTimeout(refreshData, 1000);
    }

    async function deleteItem(table, id) {
        if(!confirm("Remove this entry?")) return;
        showLoader(true);
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'DELETE_ITEM', table: table, id: id }) });
        setTimeout(refreshData, 1000);
    }

    function showLoader(show) { document.getElementById('loader').style.display = show ? 'block' : 'none'; }
</script>
</body>
</html>
